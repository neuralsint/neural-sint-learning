<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Sint обучение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Минимальные стили */
        body { font-family: sans-serif; padding: 16px; background: #1e1e2e; color: white; }
        .button { background: #667eea; color: white; border: none; border-radius: 24px; padding: 12px 24px; cursor: pointer; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Neural Sint training</h1>
    <div>
        <button class="button" onclick="sendData('open_video', 'intro')">Получить ссылку (тест)</button>
    </div>

    <script>
        // Проверяем, что Telegram WebApp доступен
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (!tg) {
            document.body.innerHTML = '<div style="color: red;">Ошибка: приложение должно быть открыто в Telegram!</div>';
        } else {
            tg.ready();
            tg.expand();

            window.sendData = function(action, id) {
                // Формируем простую строку
                const message = action + ':' + id;
                // Показываем, что отправляем
                tg.showAlert('Отправляю: ' + message);
                // Отправляем
                tg.sendData(message);
                // Подтверждение
                tg.showAlert('Отправлено! Бот ответит в чат.');
            };

            tg.MainButton.setText("Закрыть");
            tg.MainButton.onClick(() => tg.close());
        }
    </script>
</body>
</html>
