<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Sint обучение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: var(--tg-theme-bg-color, #1e1e2e);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #2a2a3a);
            padding-bottom: 8px;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--tg-theme-secondary-bg-color, #2a2a3a);
            color: var(--tg-theme-text-color, #fff);
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: var(--tg-theme-button-color, #667eea);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .content {
            flex: 1;
        }
        .video-list, .text-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .video-card, .text-card {
            background: var(--tg-theme-secondary-bg-color, #2a2a3a);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .video-title, .text-title {
            font-size: 18px;
            font-weight: 600;
        }
        .video-description, .text-description {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #a0a0b0);
        }
        .button {
            background: var(--tg-theme-button-color, #667eea);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            align-self: flex-start;
            transition: 0.2s;
        }
        .button:hover {
            opacity: 0.9;
        }
        .hidden {
            display: none !important;
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            color: var(--tg-theme-hint-color, #a0a0b0);
            font-size: 14px;
        }
        .video-player-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            background: #000;
        }
        .back-button {
            background: var(--tg-theme-secondary-bg-color, #2a2a3a);
            color: var(--tg-theme-text-color, #fff);
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            align-self: flex-start;
        }
        .error-message {
            background: #ff4444;
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .subscribe-link {
            color: var(--tg-theme-button-color, #667eea);
            text-decoration: underline;
            cursor: pointer;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">NS</div>
        <h1>Neural Sint training</h1>
    </div>

    <!-- Сообщение об ошибке (скрыто) -->
    <div id="error-message" class="error-message hidden"></div>

    <!-- Режим меню (список уроков) -->
    <div id="menu-mode">
        <div class="tabs">
            <button class="tab active" id="tab-video">🎥 Видео</button>
            <button class="tab" id="tab-text">📖 Тексты</button>
        </div>

        <div class="content" id="content-video">
            <div class="video-list">
                <div class="video-card">
                    <div class="video-title">Введение в нейросети</div>
                    <div class="video-description">Что такое нейросети и как они работают? Основные понятия.</div>
                    <button class="button" onclick="sendRequest('open_video', 'intro')">Смотреть видео</button>
                </div>
                <!-- Можно добавить другие видео позже -->
            </div>
        </div>

        <div class="content hidden" id="content-text">
            <div class="text-list">
                <div class="text-card">
                    <div class="text-title">Гайд: Основы промптинга</div>
                    <div class="text-description">Подробное руководство для новичков с примерами.</div>
                    <button class="button" onclick="sendRequest('open_text', 'guide1')">Получить ссылку</button>
                </div>
            </div>
        </div>

        <div class="footer">
            Нажми «Смотреть видео» – бот проверит подписку и запустит видео
        </div>
    </div>

    <!-- Режим видеоплеера (скрыт по умолчанию) -->
    <div id="player-mode" class="hidden">
        <div class="video-player-container">
            <video id="video-player" controls autoplay muted playsinline>
                <source src="" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
            <button class="back-button" onclick="goBack()">← Назад к урокам</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const menuMode = document.getElementById('menu-mode');
        const playerMode = document.getElementById('player-mode');
        const videoPlayer = document.getElementById('video-player');
        const errorDiv = document.getElementById('error-message');

        // Вкладки
        const tabVideo = document.getElementById('tab-video');
        const tabText = document.getElementById('tab-text');
        const contentVideo = document.getElementById('content-video');
        const contentText = document.getElementById('content-text');

        tabVideo.addEventListener('click', () => {
            tabVideo.classList.add('active');
            tabText.classList.remove('active');
            contentVideo.classList.remove('hidden');
            contentText.classList.add('hidden');
        });

        tabText.addEventListener('click', () => {
            tabText.classList.add('active');
            tabVideo.classList.remove('active');
            contentText.classList.remove('hidden');
            contentVideo.classList.add('hidden');
        });

        // Функция отправки запроса в бота
        window.sendRequest = function(action, id) {
            tg.sendData(JSON.stringify({ action, id }));
            tg.showAlert('Запрос отправлен! Ожидайте ответ...');
        };

        // Обработка ответа от бота
        tg.onEvent('webAppData', function(data) {
            console.log('Получены данные от бота:', data);
            try {
                const response = JSON.parse(data);
                if (response.type === 'video') {
                    // Воспроизводим видео
                    videoPlayer.src = response.url;
                    menuMode.classList.add('hidden');
                    playerMode.classList.remove('hidden');
                    errorDiv.classList.add('hidden');
                    videoPlayer.play().catch(e => console.log('Автовоспроизведение заблокировано', e));
                } else if (response.type === 'text') {
                    // Для текстов можно открыть ссылку в браузере
                    window.open(response.url, '_blank');
                } else if (response.type === 'error') {
                    // Показываем ошибку
                    errorDiv.innerHTML = response.message;
                    if (response.link) {
                        errorDiv.innerHTML += `<span class="subscribe-link" onclick="window.open('${response.link}', '_blank')"> Подписаться</span>`;
                    }
                    errorDiv.classList.remove('hidden');
                } else {
                    console.warn('Неизвестный тип ответа:', response);
                }
            } catch (e) {
                console.error('Ошибка парсинга ответа:', e);
                errorDiv.innerText = 'Ошибка получения данных от бота';
                errorDiv.classList.remove('hidden');
            }
        });

        window.goBack = function() {
            videoPlayer.pause();
            videoPlayer.src = '';
            playerMode.classList.add('hidden');
            menuMode.classList.remove('hidden');
            errorDiv.classList.add('hidden');
        };

        // Главная кнопка Telegram
        tg.MainButton.setText("Закрыть");
        tg.MainButton.onClick(() => tg.close());
    </script>
</body>
</html>
