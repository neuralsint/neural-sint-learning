<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Sint обучение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <h1>Neural Sint training</h1>
    <button onclick="sendData()">Получить ссылку</button>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function sendData() {
            const data = JSON.stringify({ action: 'open_video', id: 'intro' });
            tg.sendData(data);
            tg.showAlert('Отправлено: ' + data);
        }

        tg.MainButton.setText("Закрыть");
        tg.MainButton.onClick(() => tg.close());
    </script>
</body>
</html>
