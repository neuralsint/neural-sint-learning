<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Sint обучение</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: var(--tg-theme-bg-color, #1e1e2e);
            color: var(--tg-theme-text-color, #ffffff);
            padding: 16px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 20px;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
        }
        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--tg-theme-hint-color, #2a2a3a);
            padding-bottom: 8px;
        }
        .tab {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--tg-theme-secondary-bg-color, #2a2a3a);
            color: var(--tg-theme-text-color, #fff);
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .tab.active {
            background: var(--tg-theme-button-color, #667eea);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .content {
            flex: 1;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .video-card {
            background: var(--tg-theme-secondary-bg-color, #2a2a3a);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-card:hover {
            transform: scale(1.02);
        }
        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #333;
            position: relative;
        }
        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 48px;
            height: 48px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            border: 2px solid white;
        }
        .video-info {
            padding: 12px;
        }
        .video-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .video-description {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #a0a0b0);
        }
        .footer {
            margin-top: 24px;
            text-align: center;
            color: var(--tg-theme-hint-color, #a0a0b0);
            font-size: 14px;
        }
        .video-player-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }
        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            background: #000;
        }
        .back-button {
            background: var(--tg-theme-secondary-bg-color, #2a2a3a);
            color: var(--tg-theme-text-color, #fff);
            border: none;
            border-radius: 24px;
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            align-self: flex-start;
        }
        .hidden {
            display: none !important;
        }
        .error-message {
            background: #ff4444;
            color: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
        }
        .subscribe-link {
            color: var(--tg-theme-button-color, #667eea);
            text-decoration: underline;
            cursor: pointer;
            margin-left: 8px;
        }
        .text-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">NS</div>
        <h1>Neural Sint training</h1>
    </div>

    <!-- Сообщение об ошибке -->
    <div id="error-message" class="error-message hidden"></div>

    <!-- Режим меню -->
    <div id="menu-mode">
        <div class="tabs">
            <button class="tab active" id="tab-video">🎥 Видео</button>
            <button class="tab" id="tab-text">📖 Тексты</button>
        </div>

        <div class="content" id="content-video">
            <div class="video-grid" id="video-grid"></div>
        </div>

        <div class="content hidden" id="content-text">
            <div class="text-list" id="text-list"></div>
        </div>

        <div class="footer">
            Нажми на видео – бот проверит подписку и запустит плеер
        </div>
    </div>

    <!-- Режим плеера -->
    <div id="player-mode" class="hidden">
        <div class="video-player-container">
            <video id="video-player" controls autoplay muted playsinline>
                <source src="" type="video/mp4">
                Ваш браузер не поддерживает видео.
            </video>
            <button class="back-button" onclick="goBack()">← Назад к урокам</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const menuMode = document.getElementById('menu-mode');
        const playerMode = document.getElementById('player-mode');
        const videoPlayer = document.getElementById('video-player');
        const errorDiv = document.getElementById('error-message');
        const videoGrid = document.getElementById('video-grid');
        const textList = document.getElementById('text-list');

        // Данные о видео (замените ссылки на обложки, когда загрузите)
        const videos = [
            {
                id: 'intro',
                title: 'Введение в нейросети',
                description: 'Что такое нейросети и как они работают? Основные понятия.',
                thumbnail: 'https://via.placeholder.com/300x169?text=Введение' // заглушка
            },
            {
                id: 'prompts',
                title: 'Как правильно писать промпты',
                description: 'Секреты эффективных запросов для генерации изображений.',
                thumbnail: 'https://via.placeholder.com/300x169?text=Промпты'
            },
            {
                id: 'image',
                title: 'Генерация изображений',
                description: 'Советы и примеры, лучшие практики.',
                thumbnail: 'https://via.placeholder.com/300x169?text=Изображения'
            },
            {
                id: 'video',
                title: 'Создание видео с ИИ',
                description: 'Инструменты и подходы.',
                thumbnail: 'https://via.placeholder.com/300x169?text=Видео'
            },
            {
                id: 'audio',
                title: 'Генерация музыки',
                description: 'Как нейросети создают мелодии и треки.',
                thumbnail: 'https://via.placeholder.com/300x169?text=Музыка'
            }
        ];

        const texts = [
            {
                id: 'guide1',
                title: 'Гайд: Основы промптинга',
                description: 'Подробное руководство для новичков с примерами.'
            },
            {
                id: 'article1',
                title: 'Статья: 10 ошибок при генерации фото',
                description: 'Как их избежать и получать качественные результаты.'
            },
            {
                id: 'models',
                title: 'Справочник: Модели нейросетей',
                description: 'Описание популярных моделей и их возможностей.'
            }
        ];

        function renderVideos() {
            videoGrid.innerHTML = '';
            videos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.setAttribute('data-id', video.id);
                card.innerHTML = `
                    <div class="video-thumbnail">
                        <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                        <div class="play-icon">▶</div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-description">${video.description}</div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    sendRequest('open_video', video.id);
                });
                videoGrid.appendChild(card);
            });
        }

        function renderTexts() {
            textList.innerHTML = '';
            texts.forEach(text => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.innerHTML = `
                    <div class="video-info">
                        <div class="video-title">${text.title}</div>
                        <div class="video-description">${text.description}</div>
                        <button class="back-button" style="margin-top:8px;">Читать</button>
                    </div>
                `;
                card.addEventListener('click', () => {
                    sendRequest('open_text', text.id);
                });
                textList.appendChild(card);
            });
        }

        // Вкладки
        const tabVideo = document.getElementById('tab-video');
        const tabText = document.getElementById('tab-text');
        const contentVideo = document.getElementById('content-video');
        const contentText = document.getElementById('content-text');

        tabVideo.addEventListener('click', () => {
            tabVideo.classList.add('active');
            tabText.classList.remove('active');
            contentVideo.classList.remove('hidden');
            contentText.classList.add('hidden');
        });

        tabText.addEventListener('click', () => {
            tabText.classList.add('active');
            tabVideo.classList.remove('active');
            contentText.classList.remove('hidden');
            contentVideo.classList.add('hidden');
        });

        function sendRequest(action, id) {
            tg.sendData(JSON.stringify({ action, id }));
            tg.showAlert('Запрос отправлен! Ожидайте ответ...');
        }

        // Обработка ответа от бота
        tg.onEvent('webAppData', function(data) {
            console.log('Получены данные от бота:', data);
            try {
                const response = JSON.parse(data);
                if (response.type === 'video') {
                    videoPlayer.src = response.url;
                    menuMode.classList.add('hidden');
                    playerMode.classList.remove('hidden');
                    errorDiv.classList.add('hidden');
                    videoPlayer.play().catch(e => console.log('Автовоспроизведение заблокировано', e));
                } else if (response.type === 'text') {
                    window.open(response.url, '_blank');
                } else if (response.type === 'error') {
                    errorDiv.innerHTML = response.message;
                    if (response.link) {
                        errorDiv.innerHTML += `<span class="subscribe-link" onclick="window.open('${response.link}', '_blank')"> Подписаться</span>`;
                    }
                    errorDiv.classList.remove('hidden');
                }
            } catch (e) {
                console.error('Ошибка парсинга ответа:', e);
                errorDiv.innerText = 'Ошибка получения данных от бота';
                errorDiv.classList.remove('hidden');
            }
        });

        window.goBack = function() {
            videoPlayer.pause();
            videoPlayer.src = '';
            playerMode.classList.add('hidden');
            menuMode.classList.remove('hidden');
            errorDiv.classList.add('hidden');
        };

        renderVideos();
        renderTexts();

        tg.MainButton.setText("Закрыть");
        tg.MainButton.onClick(() => tg.close());
    </script>
</body>
</html>
